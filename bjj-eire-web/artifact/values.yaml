nameOverride: "bjj-frontend"
fullnameOverride: "bjj-frontend"
namespace: bjjeire-app

frontend:
  enabled: true
  replicaCount: 1

  image:
    repository: bjj-frontend
    pullPolicy: IfNotPresent
    tag: "local"

  imagePullSecrets: []

  serviceAccount:
    create: true
    annotations: {}
    name: ""

  podAnnotations: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 101
    capabilities:
      drop:
        - ALL

  service:
    type: ClusterIP
    port: 80

  env:
    NODE_ENV: production
    PORT: "80"
    SERVICES_API_HTTP_0: "http://bjj-api:80"

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  livenessProbe:
    httpGet:
      path: /health
      port: http
      scheme: HTTP
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
    successThreshold: 1

  readinessProbe:
    httpGet:
      path: /health
      port: http
      scheme: HTTP
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  startupProbe:
    httpGet:
      path: /health
      port: http
      scheme: HTTP
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 30
    successThreshold: 1

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

  podDisruptionBudget:
    enabled: false
    minAvailable: 1
    maxUnavailable: ""

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  waitForApi:
    enabled: true
    apiUrl: "http://bjj-api.bjjeire-app.svc.cluster.local:80/health"
    image: curlimages/curl:8.20.0

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: app.bjj.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: bjj-tls-secret
      hosts:
        - app.bjj.local

secrets: {}

azure:
  enabled: false
  tenantId: ""
  keyVaultName: ""
  acrName: ""
  workloadIdentity:
    enabled: false
    clientId: ""
