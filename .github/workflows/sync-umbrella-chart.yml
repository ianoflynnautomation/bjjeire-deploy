name: Sync Umbrella Chart Dependencies

on:
  push:
    branches: [main]
    paths:
      - "bjj-eire-api/artifact/Chart.yaml"
      - "bjj-eire-web/artifact/Chart.yaml"
      - "bjj-eire-mongodb/artifact/Chart.yaml"

permissions:
  contents: write

jobs:
  sync:
    name: Update Umbrella Chart Dependency Versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Read subchart versions
        id: versions
        run: |
          echo "api=$(yq '.version' bjj-eire-api/artifact/Chart.yaml)"         >> "$GITHUB_OUTPUT"
          echo "frontend=$(yq '.version' bjj-eire-web/artifact/Chart.yaml)"    >> "$GITHUB_OUTPUT"
          echo "mongodb=$(yq '.version' bjj-eire-mongodb/artifact/Chart.yaml)" >> "$GITHUB_OUTPUT"

      - name: Patch umbrella Chart.yaml dependencies
        env:
          API_VERSION:      ${{ steps.versions.outputs.api }}
          FRONTEND_VERSION: ${{ steps.versions.outputs.frontend }}
          MONGODB_VERSION:  ${{ steps.versions.outputs.mongodb }}
        run: |
          yq -i '(.dependencies[] | select(.name == "bjj-api")).version      = strenv(API_VERSION)'      bjj-eire/artifact/Chart.yaml
          yq -i '(.dependencies[] | select(.name == "bjj-frontend")).version = strenv(FRONTEND_VERSION)' bjj-eire/artifact/Chart.yaml
          yq -i '(.dependencies[] | select(.name == "bjj-mongodb")).version  = strenv(MONGODB_VERSION)'  bjj-eire/artifact/Chart.yaml

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet bjj-eire/artifact/Chart.yaml && echo "No changes." && exit 0
          git add bjj-eire/artifact/Chart.yaml
          git commit -m "chore: sync umbrella chart dependency versions

          api=${{ steps.versions.outputs.api }}
          frontend=${{ steps.versions.outputs.frontend }}
          mongodb=${{ steps.versions.outputs.mongodb }}"
          git push
