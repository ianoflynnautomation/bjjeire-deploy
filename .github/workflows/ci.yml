name: CI — Helm Lint & Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  HELM_VERSION: "3.16.4"

permissions:
  contents: read

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Lint subcharts
        run: |
          helm lint bjj-eire-api/artifact
          helm lint bjj-eire-mongodb/artifact
          helm lint bjj-eire-web/artifact

      - name: Build umbrella deps & lint
        run: |
          helm dependency build bjj-eire/artifact
          helm lint bjj-eire/artifact

  template:
    name: Helm Template (dry-run)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Render umbrella chart
        env:
          # Dummy base64 value ("ci-dummy-password") — satisfies the Helm template lookup
          CI_DUMMY_MONGO_PASSWORD: "Y2ktZHVtbXktcGFzc3dvcmQ="
        run: |
          helm dependency build bjj-eire/artifact
          helm template bjj-eire bjj-eire/artifact \
            --set bjj-api.api.image.tag=ci \
            --set bjj-frontend.frontend.image.tag=ci \
            --set "bjj-api.secrets.mongodbRootPassword.value=${CI_DUMMY_MONGO_PASSWORD}" \
            --set "bjj-mongodb.secrets.mongodbRootPassword.value=${CI_DUMMY_MONGO_PASSWORD}" \
            --debug > /tmp/rendered.yaml

      - name: Install kubeconform
        run: |
          curl -sSLo /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin

      - name: Validate rendered manifests
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/rendered.yaml

      - name: Install kube-score
        run: |
          curl -sSLo /tmp/kube-score.tar.gz \
            https://github.com/zegl/kube-score/releases/download/v1.20.0/kube-score_1.20.0_linux_amd64.tar.gz
          tar -xzf /tmp/kube-score.tar.gz -C /usr/local/bin kube-score
          chmod +x /usr/local/bin/kube-score

      - name: Score rendered manifests
        run: |
          echo "::group::kube-score"
          kube-score score /tmp/rendered.yaml --output-format ci || true
          echo "::endgroup::"
