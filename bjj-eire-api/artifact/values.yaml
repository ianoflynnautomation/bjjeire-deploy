nameOverride: "bjj-api"
fullnameOverride: "bjj-api"
namespace: bjjeire-app

api:
  enabled: true
  replicaCount: 1
  image:
    repository: bjj-api
    pullPolicy: IfNotPresent
    tag: "local"

  imagePullSecrets: []

  serviceAccount:
    create: true
    annotations: {}
    name: ""

  podAnnotations: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL

  service:
    type: ClusterIP
    port: 80

  env:
    ASPNETCORE_ENVIRONMENT: Production
    ASPNETCORE_URLS: "http://+:80"
    ASPNETCORE_HTTP_PORT: "80"
    CorsOptions__AllowedOrigins: "https://bjjeire.com"
    CorsOptions__AllowedMethods: "GET,POST,PUT,DELETE"
    CorsOptions__AllowedHeaders: "Authorization,Content-Type"
    RateLimitOptions__EnableRateLimiting: "true"
    RateLimitOptions__PermitLimit: "5"
    RateLimitOptions__WindowInSeconds: "10"
    RateLimitOptions__RejectionStatusCode: "429"
    CacheOptions__DefaultExpirationMinutes: "5"
    ReadOnlyMode__Enabled: "true"
    CompetitionDeactivation__Interval: "1.00:00:00"
    CompetitionDeactivation__InitialDelay: "00:00:30"
    FeatureManagement__BjjEvents: "true"
    FeatureManagement__Gyms: "true"
    FeatureManagement__Stores: "true"
    FeatureManagement__Competitions: "true"
    Donation__BitcoinAddress: ""
    ServiceDefaults__ServiceName: "BjjEire.Api"
    ServiceDefaults__EnablePrometheus: "true"
    AzureAd__Instance: "https://login.microsoftonline.com/"
    AzureAd__TenantId: ""
    AzureAd__ClientId: ""
    AzureAd__Audience: ""
    Serilog__Properties__Application: "BjjWorld.Api"
    OTEL_EXPORTER_OTLP_ENDPOINT: ""
    OTEL_RESOURCE_ATTRIBUTES__service.name: "BjjWorld.Api"
    OTEL_RESOURCE_ATTRIBUTES__deployment.environment: "Production"

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  livenessProbe:
    httpGet:
      path: /health
      port: http
      scheme: HTTP
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
    successThreshold: 1

  readinessProbe:
    httpGet:
      path: /health
      port: http
      scheme: HTTP
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  startupProbe:
    httpGet:
      path: /health
      port: http
      scheme: HTTP
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 30
    successThreshold: 1

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

  podDisruptionBudget:
    enabled: false
    minAvailable: 1
    maxUnavailable: ""

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  kestrelCert:
    enabled: false
    mountPath: /https
    secretName: ""

mongodb:
  config:
    user: admin
    host: bjj-mongodb
    port: 27017
    database: Mongodb

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  hosts:
    - host: api.bjj.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: bjj-tls-secret
      hosts:
        - api.bjj.local

secrets:
  mongodbRootPassword:
    enabled: true
    create: false
    name: bjj-mongodb-root-password
    key: mongodb-password
    value: ""

azure:
  enabled: false
  tenantId: ""
  keyVaultName: ""
  acrName: ""
  workloadIdentity:
    enabled: false
    clientId: ""
