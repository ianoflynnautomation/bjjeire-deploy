{{- if .Values.mongodb.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "bjj-mongodb.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bjj-mongodb.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.mongodb.replicaCount }}
  serviceName: {{ include "bjj-mongodb.fullname" . }}
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "bjj-mongodb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.mongodb.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "bjj-mongodb.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.mongodb.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "bjj-mongodb.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.mongodb.podSecurityContext | nindent 8 }}
      {{- with .Values.mongodb.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mongodb.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mongodb.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mongodb
          securityContext:
            {{- toYaml .Values.mongodb.securityContext | nindent 12 }}
          image: "{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.mongodb.image.pullPolicy }}
          ports:
            - name: mongo
              containerPort: {{ .Values.mongodb.service.port }}
              protocol: TCP
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: {{ .Values.mongodb.config.user | quote }}
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.mongodbRootPassword.name }}
                  key: {{ .Values.secrets.mongodbRootPassword.key }}
            - name: MONGO_INITDB_DATABASE
              value: {{ .Values.mongodb.config.database | quote }}
          {{- if .Values.mongodb.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.mongodb.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.mongodb.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.mongodb.readinessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.mongodb.startupProbe }}
          startupProbe:
            {{- toYaml .Values.mongodb.startupProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.mongodb.resources | nindent 12 }}
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
            {{- if .Values.azure.enabled }}
            - name: secrets-store-vol
              mountPath: /mnt/secrets-store
              readOnly: true
            {{- end }}
        {{- if .Values.mongodb.metrics.enabled }}
        - name: mongodb-exporter
          image: "{{ .Values.mongodb.metrics.image.repository }}:{{ .Values.mongodb.metrics.image.tag }}"
          imagePullPolicy: {{ .Values.mongodb.metrics.image.pullPolicy }}
          args:
            - --mongodb.uri=mongodb://127.0.0.1:{{ .Values.mongodb.service.port }}/admin
            {{- if .Values.mongodb.metrics.collectAll }}
            - --collect-all
            {{- end }}
            {{- if .Values.mongodb.metrics.compatibleMode }}
            - --compatible-mode
            {{- end }}
          env:
            - name: MONGODB_USER
              value: {{ .Values.mongodb.config.user | quote }}
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.mongodbRootPassword.name }}
                  key: {{ .Values.secrets.mongodbRootPassword.key }}
          ports:
            - name: metrics
              containerPort: {{ .Values.mongodb.metrics.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.mongodb.metrics.resources | nindent 12 }}
        {{- end }}
      {{- if .Values.azure.enabled }}
      volumes:
        - name: secrets-store-vol
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "bjj-mongodb.fullname" . }}-akv-secrets
      {{- end }}
  {{- if .Values.mongodb.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
        labels:
          {{- include "bjj-mongodb.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.mongodb.persistence.accessModes | nindent 10 }}
        storageClassName: {{ .Values.mongodb.persistence.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.mongodb.persistence.size }}
  {{- else }}
  # persistence disabled — data is ephemeral
  {{- end }}
{{- end }}
