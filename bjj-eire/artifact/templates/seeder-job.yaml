{{- if .Values.seeder.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-seeder
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: bjjeire-seeder
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: seeder
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": {{ .Values.seeder.hookPolicy }}
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bjjeire-seeder
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: seeder
    spec:
      restartPolicy: Never
      {{- with .Values.seeder.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: seeder
          image: "{{ .Values.seeder.image.repository }}:{{ .Values.seeder.image.tag }}"
          imagePullPolicy: {{ .Values.seeder.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          args: ["--force"]
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: SEED_DATASET
              value: {{ .Values.seeder.dataset | default "production" | quote }}
            # Injected first so it can be referenced via $(MONGO_PASSWORD) below
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.seeder.mongodb.secretName }}
                  key: {{ .Values.seeder.mongodb.secretKey }}
            - name: ConnectionStrings__Mongodb
              value: "mongodb://{{ .Values.seeder.mongodb.user }}:$(MONGO_PASSWORD)@{{ .Values.seeder.mongodb.host }}:{{ .Values.seeder.mongodb.port }}/{{ .Values.seeder.mongodb.database }}?authSource=admin&authMechanism=SCRAM-SHA-256"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
{{- end }}
