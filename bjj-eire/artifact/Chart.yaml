apiVersion: v2
name: bjj-eire
description: Umbrella Helm chart for BJJ Éire — React 19 frontend + .NET 10 API + MongoDB
type: application
version: 0.1.10
appVersion: "0.2.0"
keywords:
  - bjj
  - dotnet
  - react
  - mongodb
maintainers:
  - name: DevOps Team
    email: devops@example.com
dependencies:
  - name: bjj-mongodb
    version: "0.1.1"
    repository: "file://../../bjj-eire-mongodb/artifact"
    condition: bjj-mongodb.mongodb.enabled
  - name: bjj-api
    version: "0.1.4"
    repository: "file://../../bjj-eire-api/artifact"
    condition: bjj-api.api.enabled
  - name: bjj-frontend
    version: "0.1.4"
    repository: "file://../../bjj-eire-web/artifact"
    condition: bjj-frontend.frontend.enabled
