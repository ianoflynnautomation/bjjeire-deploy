bjj-mongodb:
  mongodb:
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
    persistence:
      storageClassName: standard
      size: 2Gi
    metrics:
      enabled: true

bjj-api:
  api:
    image:
      repository: bjj-api
      tag: "local"
      pullPolicy: Never
    env:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:80"
      ASPNETCORE_HTTP_PORT: "80"
      CorsOptions__AllowedOrigins: "https://localhost:5173,http://localhost:5173,https://app.bjj.local,http://app.bjj.local"
      CorsOptions__AllowedMethods: "GET,POST,PUT,DELETE"
      CorsOptions__AllowedHeaders: "Authorization,Content-Type"
      RateLimitOptions__EnableRateLimiting: "false"
      RateLimitOptions__PermitLimit: "5"
      RateLimitOptions__WindowInSeconds: "10"
      RateLimitOptions__RejectionStatusCode: "429"
      CacheOptions__DefaultExpirationMinutes: "5"
      ReadOnlyMode__Enabled: "true"
      CompetitionDeactivation__Interval: "1.00:00:00"
      CompetitionDeactivation__InitialDelay: "00:00:30"
      FeatureManagement__BjjEvents: "true"
      FeatureManagement__Gyms: "true"
      FeatureManagement__Stores: "true"
      FeatureManagement__Competitions: "true"
      ServiceDefaults__ServiceName: "BjjEire.Api"
      ServiceDefaults__EnablePrometheus: "true"
      AzureAd__Instance: "https://login.microsoftonline.com/"
      # Microsoft.Identity.Web still initializes for anonymous requests. Dummy
      # identifiers keep local health checks working without real Azure access.
      AzureAd__TenantId: "00000000-0000-0000-0000-000000000001"
      AzureAd__ClientId: "00000000-0000-0000-0000-000000000002"
      AzureAd__Audience: "api://00000000-0000-0000-0000-000000000002"
      Donation__BitcoinAddress: ""
      Serilog__Properties__Application: "BjjWorld.Api"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_RESOURCE_ATTRIBUTES__service.name: "BjjWorld.Api"
      OTEL_RESOURCE_ATTRIBUTES__deployment.environment: "Development"

    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

  ingress:
    hosts:
      - host: api.bjj.local
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: bjj-tls-secret
        hosts:
          - api.bjj.local

bjj-frontend:
  frontend:
    image:
      repository: bjj-frontend
      tag: "local"
      pullPolicy: Never
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 101
      fsGroup: 101
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 101
      capabilities:
        drop:
          - ALL
        add:
          - NET_BIND_SERVICE
    env:
      NODE_ENV: production
      PORT: "80"
      SERVICES_API_HTTP_0: "http://bjj-api:80"
    autoscaling:
      enabled: false
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi
    waitForApi:
      enabled: false

  ingress:
    hosts:
      - host: app.bjj.local
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: bjj-tls-secret
        hosts:
          - app.bjj.local

seeder:
  enabled: true
  dataset: "test"
  image:
    repository: bjj-seeder
    tag: "local"
    pullPolicy: Never
