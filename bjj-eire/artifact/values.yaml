bjj-mongodb:
  nameOverride: "bjj-mongodb"
  fullnameOverride: "bjj-mongodb"
  namespace: bjjeire-app

  mongodb:
    enabled: true
    replicaCount: 1
    image:
      repository: mongo
      pullPolicy: IfNotPresent
      tag: "8.2"
    imagePullSecrets: []
    serviceAccount:
      create: true
      annotations: {}
      name: ""
    podAnnotations: {}
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 999
      fsGroup: 999
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 999
      capabilities:
        drop:
          - ALL
    service:
      type: ClusterIP
      port: 27017
    config:
      user: admin
      database: Mongodb
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 512Mi
    livenessProbe:
      exec:
        command:
          - mongosh
          - --eval
          - "db.adminCommand('ping')"
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 6
      successThreshold: 1
    readinessProbe:
      exec:
        command:
          - mongosh
          - --eval
          - "db.adminCommand('ping')"
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
    startupProbe:
      exec:
        command:
          - mongosh
          - --eval
          - "db.adminCommand('ping')"
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 30
      successThreshold: 1
    persistence:
      enabled: true
      storageClassName: standard
      size: 10Gi
      accessModes:
        - ReadWriteOnce
    nodeSelector: {}
    tolerations: []
    affinity: {}

  secrets:
    mongodbRootPassword:
      enabled: true
      create: false
      name: bjj-mongodb-root-password
      key: mongodb-password
      value: ""

  azure:
    enabled: false
    tenantId: ""
    keyVaultName: ""
    workloadIdentity:
      enabled: false
      clientId: ""

bjj-api:
  nameOverride: "bjj-api"
  fullnameOverride: "bjj-api"
  namespace: bjjeire-app

  api:
    enabled: true
    replicaCount: 1
    image:
      repository: bjj-api
      pullPolicy: IfNotPresent
      tag: "local"
    imagePullSecrets: []
    serviceAccount:
      create: true
      annotations: {}
      name: ""
    podAnnotations: {}
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 1000
      capabilities:
        drop:
          - ALL
    service:
      type: ClusterIP
      port: 80

    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:80"
      ASPNETCORE_HTTP_PORT: "80"
      CorsOptions__AllowedOrigins: "https://bjjeire.com"
      CorsOptions__AllowedMethods: "GET,POST,PUT,DELETE"
      CorsOptions__AllowedHeaders: "Authorization,Content-Type"
      RateLimitOptions__EnableRateLimiting: "true"
      RateLimitOptions__PermitLimit: "5"
      RateLimitOptions__WindowInSeconds: "10"
      RateLimitOptions__RejectionStatusCode: "429"
      CacheOptions__DefaultExpirationMinutes: "5"
      MongoDb__MaxConnectionPoolSize: "100"
      MongoDb__ServerSelectionTimeoutSeconds: "5"
      MongoDb__ConnectTimeoutSeconds: "10"
      MongoDb__SocketTimeoutSeconds: "30"
      MongoDb__EnableCompression: "true"
      ReadOnlyMode__Enabled: "true"
      CompetitionDeactivation__Interval: "1.00:00:00"
      CompetitionDeactivation__InitialDelay: "00:00:30"
      FeatureManagement__BjjEvents: "true"
      FeatureManagement__Gyms: "true"
      FeatureManagement__Stores: "true"
      FeatureManagement__Competitions: "true"
      Donation__BitcoinAddress: ""
      ServiceDefaults__ServiceName: "BjjEire.Api"
      ServiceDefaults__EnablePrometheus: "true"
      AzureAd__Instance: "https://login.microsoftonline.com/"
      AzureAd__TenantId: ""
      AzureAd__ClientId: ""
      AzureAd__Audience: ""
      Serilog__Properties__Application: "BjjWorld.Api"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_RESOURCE_ATTRIBUTES__service.name: "BjjWorld.Api"
      OTEL_RESOURCE_ATTRIBUTES__deployment.environment: "Production"

    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
    livenessProbe:
      httpGet:
        path: /health
        port: http
        scheme: HTTP
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
      successThreshold: 1
    readinessProbe:
      httpGet:
        path: /health
        port: http
        scheme: HTTP
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
    startupProbe:
      httpGet:
        path: /health
        port: http
        scheme: HTTP
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 30
      successThreshold: 1
    nodeSelector: {}
    tolerations: []
    affinity: {}
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 10
      targetCPUUtilizationPercentage: 80
    kestrelCert:
      enabled: false

  mongodb:
    config:
      user: admin
      host: bjj-mongodb
      port: 27017
      database: Mongodb

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    hosts:
      - host: api.bjj.local
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: bjj-tls-secret
        hosts:
          - api.bjj.local

  secrets:
    mongodbRootPassword:
      enabled: true
      create: false
      name: bjj-mongodb-root-password
      key: mongodb-password
      value: ""

  azure:
    enabled: false
    tenantId: ""
    keyVaultName: ""
    acrName: ""
    workloadIdentity:
      enabled: false
      clientId: ""

bjj-frontend:

  nameOverride: "bjj-frontend"
  fullnameOverride: "bjj-frontend"
  namespace: bjjeire-app

  frontend:
    enabled: true
    replicaCount: 1
    image:
      repository: bjj-frontend
      pullPolicy: IfNotPresent
      tag: "local"
    imagePullSecrets: []
    serviceAccount:
      create: true
      annotations: {}
      name: ""
    podAnnotations: {}
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 101
      fsGroup: 101
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 101
      capabilities:
        drop:
          - ALL
    service:
      type: ClusterIP
      port: 80

    env:
      NODE_ENV: production
      PORT: "80"
      SERVICES_API_HTTP_0: "http://bjj-api:80"

    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
    livenessProbe:
      httpGet:
        path: /health
        port: http
        scheme: HTTP
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
      successThreshold: 1
    readinessProbe:
      httpGet:
        path: /health
        port: http
        scheme: HTTP
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
    startupProbe:
      httpGet:
        path: /health
        port: http
        scheme: HTTP
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 30
      successThreshold: 1
    nodeSelector: {}
    tolerations: []
    affinity: {}
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 80
    waitForApi:
      enabled: true
      apiUrl: "http://bjj-api.bjjeire-app.svc.cluster.local:80/health"
      image: curlimages/curl:8.19.0

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    hosts:
      - host: app.bjj.local
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: bjj-tls-secret
        hosts:
          - app.bjj.local

  secrets: {}

  azure:
    enabled: false
    tenantId: ""
    keyVaultName: ""
    acrName: ""
    workloadIdentity:
      enabled: false
      clientId: ""

seeder:
  enabled: true
  image:
    repository: ghcr.io/ianoflynnautomation/bjjeire-seeder
    pullPolicy: IfNotPresent
    tag: "0.1.9"
  imagePullSecrets: []
  hookPolicy: "post-install,post-upgrade"
  mongodb:
    host: bjj-mongodb
    port: 27017
    user: admin
    database: Mongodb
    secretName: bjj-mongodb-root-password
    secretKey: mongodb-password
