bjj-mongodb:
  mongodb:
    image:
      tag: "8.2"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 2000m
        memory: 2Gi
      requests:
        cpu: 1000m
        memory: 1Gi
    persistence:
      storageClassName: managed-premium
      size: 50Gi
bjj-api:
  api:
    image:
      repository: ghcr.io/ianoflynnautomation/bjjeire-api
      pullPolicy: IfNotPresent
      tag: ""
    replicaCount: 2
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: "/metrics"
      prometheus.io/port: "80"
    env:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: "http://+:80"
      ASPNETCORE_HTTP_PORT: "80"
      CorsOptions__AllowedOrigins: "https://staging.bjjeire.ie,https://www.staging.bjjeire.ie"
      CorsOptions__AllowedMethods: "GET,POST,PUT,DELETE"
      CorsOptions__AllowedHeaders: "Authorization,Content-Type"
      RateLimitOptions__EnableRateLimiting: "true"
      RateLimitOptions__PermitLimit: "5"
      RateLimitOptions__WindowInSeconds: "10"
      RateLimitOptions__RejectionStatusCode: "429"
      CacheOptions__DefaultExpirationMinutes: "5"
      MongoDb__MaxConnectionPoolSize: "200"
      MongoDb__ServerSelectionTimeoutSeconds: "3"
      MongoDb__ConnectTimeoutSeconds: "10"
      MongoDb__SocketTimeoutSeconds: "15"
      MongoDb__EnableCompression: "true"
      ReadOnlyMode__Enabled: "true"
      CompetitionDeactivation__Interval: "1.00:00:00"
      CompetitionDeactivation__InitialDelay: "00:00:30"
      FeatureManagement__BjjEvents: "true"
      FeatureManagement__Gyms: "true"
      FeatureManagement__Stores: "true"
      FeatureManagement__Competitions: "true"
      ServiceDefaults__ServiceName: "BjjEire.Api"
      ServiceDefaults__EnablePrometheus: "true"
      AzureAd__Instance: "https://login.microsoftonline.com/"
      Donation__BitcoinAddress: ""
      Serilog__Properties__Application: "BjjEire.Api"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_RESOURCE_ATTRIBUTES__service.name: "BjjEire.Api"
      OTEL_RESOURCE_ATTRIBUTES__deployment.environment: "Staging"
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: api.staging.bjjeire.ie
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: bjj-staging-api-tls
        hosts:
          - api.staging.bjjeire.ie
  azure:
    enabled: true
    workloadIdentity:
      enabled: true
  secrets:
    azureAdConfig:
      enabled: true
bjj-frontend:
  frontend:
    image:
      repository: ghcr.io/ianoflynnautomation/bjjeire-frontend
      pullPolicy: IfNotPresent
      tag: ""
    replicaCount: 2
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: "/metrics"
      prometheus.io/port: "80"
    env:
      NODE_ENV: production
      PORT: "80"
      SERVICES_API_HTTP_0: "http://bjj-api:80"
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 200m
        memory: 256Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: staging.bjjeire.ie
        paths:
          - path: /
            pathType: Prefix
      - host: www.staging.bjjeire.ie
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: bjj-staging-frontend-tls
        hosts:
          - staging.bjjeire.ie
          - www.staging.bjjeire.ie
seeder:
  dataset: "test"
  image:
    repository: ghcr.io/ianoflynnautomation/bjjeire-seeder
    pullPolicy: IfNotPresent
    tag: "0.1.6"
